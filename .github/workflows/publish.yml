name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "28"

jobs:
  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: mix deps.get

      - name: Verify tag matches mix.exs version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(grep '@version' mix.exs | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match mix.exs version $APP_VERSION"
            exit 1
          fi

      - name: Run tests
        env:
          MIX_ENV: test
        run: mix test

      - name: Publish to Hex
        env:
          MIX_ENV: dev
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
